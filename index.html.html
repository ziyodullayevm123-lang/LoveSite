<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>❤️ Men Senga Bir Narsa Aytmoqchiman ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="hearts"></div>

<div class="container">

    <!-- 1-SAHIFA -->
    <section id="page1" class="page active">

        <h1>❤️ Salom ❤️</h1>

        <p>
            Bugun senga oddiy sayt emas...
            Yuragimdagi eng muhim gapni aytmoqchiman.
        </p>

        <button id="startBtn">
            Davom et 💖
        </button>

    </section>


    <!-- 2-SAHIFA -->
    <section id="page2" class="page">

        <h2>😊 Bir nechta savol...</h2>

        <h3 id="question"></h3>

        <button id="nextQuestion">
            Ha ❤️
        </button>

    </section>


    <!-- 3-SAHIFA -->
    <section id="page3" class="page">

        <h2>🥹 Eng Muhim Savol...</h2>

        <p class="loveText">

            Men seni juda yaxshi ko'raman...

            Sen ham meni sevasanmi?

        </p>

        <div class="buttons">

            <button id="yes">
                ❤️ Ha
            </button>

            <button id="no">
                💔 Yo'q
            </button>

        </div>

    </section>


    <!-- 4-SAHIFA -->
    <section id="page4" class="page">

        <h1>💖 Rahmat 💖</h1>

        <p>

            Bilardim...

            Sen mening hayotimdagi
            eng chiroyli insonsan.

        </p>

        <img src="your-photo.jpg" class="photo">

        <h2>❤️ Men Seni Sevaman ❤️</h2>

    </section>

</div>


<canvas id="confetti"></canvas>

<script src="script.js"></script>

</body>
</html>
